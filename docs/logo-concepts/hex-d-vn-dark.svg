<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="512" height="512" rx="108" ry="108" fill="#0f172a"/>
  <!-- Central hexagon with gradient stroke -->
  <polygon points="256,130 350,182 350,330 256,382 162,330 162,182" fill="none" stroke="url(#bgD)" stroke-width="10"/>
  <!-- Outer partial hexagons -->
  <polyline points="198,90 256,60 314,90" fill="none" stroke="#6366f1" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
  <polyline points="380,152 408,212 380,272" fill="none" stroke="#8b5cf6" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
  <polyline points="132,152 104,212 132,272" fill="none" stroke="#6366f1" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
  <polyline points="380,240 408,300 380,360" fill="none" stroke="#a855f7" stroke-width="5" stroke-linecap="round" opacity="0.25"/>
  <polyline points="132,240 104,300 132,360" fill="none" stroke="#8b5cf6" stroke-width="5" stroke-linecap="round" opacity="0.25"/>
  <polyline points="198,422 256,452 314,422" fill="none" stroke="#a855f7" stroke-width="5" stroke-linecap="round" opacity="0.2"/>
  <!-- Vertex dots — gradient coloured -->
  <circle cx="256" cy="130" r="8" fill="#6366f1"/>
  <circle cx="350" cy="182" r="8" fill="#7c3aed"/>
  <circle cx="350" cy="330" r="8" fill="#8b5cf6"/>
  <circle cx="256" cy="382" r="8" fill="#a855f7"/>
  <circle cx="162" cy="330" r="8" fill="#8b5cf6"/>
  <circle cx="162" cy="182" r="8" fill="#6366f1"/>
  <!-- V — lighter, gradient text -->
  <text x="218" y="285" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="120" fill="url(#bgD)" opacity="0.5">V</text>
  <!-- N — bold italic, white -->
  <text x="262" y="285" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-style="italic" font-size="120" fill="#ffffff">N</text>
</svg>
