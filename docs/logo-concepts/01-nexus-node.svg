<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Rounded square -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg1)"/>
  <!-- Three connection lines radiating from centre -->
  <line x1="256" y1="256" x2="140" y2="140" stroke="rgba(255,255,255,0.25)" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="372" y2="140" stroke="rgba(255,255,255,0.25)" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="140" y2="372" stroke="rgba(255,255,255,0.25)" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="372" y2="372" stroke="rgba(255,255,255,0.25)" stroke-width="8" stroke-linecap="round"/>
  <!-- Outer nodes (people/projects) -->
  <circle cx="140" cy="140" r="28" fill="rgba(255,255,255,0.35)"/>
  <circle cx="372" cy="140" r="28" fill="rgba(255,255,255,0.35)"/>
  <circle cx="140" cy="372" r="28" fill="rgba(255,255,255,0.35)"/>
  <circle cx="372" cy="372" r="28" fill="rgba(255,255,255,0.35)"/>
  <!-- Centre nexus node — larger, solid -->
  <circle cx="256" cy="256" r="52" fill="#ffffff"/>
  <!-- Inner spark -->
  <circle cx="256" cy="256" r="18" fill="url(#bg1)"/>
</svg>
