<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Central regular hexagon (pointy-top, r=126, center 256,256) -->
  <!-- V0(256,130) V1(365,193) V2(365,319) V3(256,382) V4(147,319) V5(147,193) -->
  <polygon points="256,130 365,193 365,319 256,382 147,319 147,193" fill="none" stroke="#ffffff" stroke-width="10"/>

  <!-- Outer arms — each apex aligns radially with a vertex, each line parallel to adjacent hex side -->
  <!-- Arm at V0 (top) — lines parallel to sides V5-V0 and V0-V1 -->
  <polyline points="204,110 256,80 308,110" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arm at V1 (top-right) — lines parallel to sides V0-V1 and V1-V2 -->
  <polyline points="356,138 408,168 408,228" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arm at V2 (bottom-right) — lines parallel to sides V1-V2 and V2-V3 -->
  <polyline points="408,284 408,344 356,374" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arm at V3 (bottom) — lines parallel to sides V2-V3 and V3-V4 -->
  <polyline points="308,402 256,432 204,402" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arm at V4 (bottom-left) — lines parallel to sides V3-V4 and V4-V5 -->
  <polyline points="156,374 104,344 104,284" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arm at V5 (top-left) — lines parallel to sides V4-V5 and V5-V0 -->
  <polyline points="104,228 104,168 156,138" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Vertex dots (atoms) at each hexagon vertex -->
  <circle cx="256" cy="130" r="8" fill="#ffffff"/>
  <circle cx="365" cy="193" r="8" fill="#ffffff"/>
  <circle cx="365" cy="319" r="8" fill="#ffffff"/>
  <circle cx="256" cy="382" r="8" fill="#ffffff"/>
  <circle cx="147" cy="319" r="8" fill="#ffffff"/>
  <circle cx="147" cy="193" r="8" fill="#ffffff"/>

  <!-- VN monogram — V merges into N, sharing the right stroke -->
  <!-- V: faded, left half -->
  <path d="M188 200 L246 318 L246 200" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- N: bold, right half — shared left stroke with V -->
  <path d="M246 318 L246 200 L324 318 L324 200" fill="none" stroke="#ffffff" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
