<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgB)"/>
  <!-- Central hexagon -->
  <polygon points="256,130 350,182 350,330 256,382 162,330 162,182" fill="none" stroke="#ffffff" stroke-width="10"/>
  <!-- Outer partial hexagons -->
  <polyline points="198,90 256,60 314,90" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="5" stroke-linecap="round"/>
  <polyline points="380,152 408,212 380,272" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="5" stroke-linecap="round"/>
  <polyline points="132,152 104,212 132,272" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="5" stroke-linecap="round"/>
  <polyline points="380,240 408,300 380,360" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="5" stroke-linecap="round"/>
  <polyline points="132,240 104,300 132,360" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="5" stroke-linecap="round"/>
  <polyline points="198,422 256,452 314,422" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="5" stroke-linecap="round"/>
  <!-- Vertex dots -->
  <circle cx="256" cy="130" r="8" fill="#ffffff"/>
  <circle cx="350" cy="182" r="8" fill="#ffffff"/>
  <circle cx="350" cy="330" r="8" fill="#ffffff"/>
  <circle cx="256" cy="382" r="8" fill="#ffffff"/>
  <circle cx="162" cy="330" r="8" fill="#ffffff"/>
  <circle cx="162" cy="182" r="8" fill="#ffffff"/>
  <!-- V — merges into N, sharing the right stroke -->
  <!-- The V's right leg becomes the N's left leg -->
  <path d="M185 195 L245 320 L245 195" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- N — bold, sharing left stroke with V -->
  <path d="M245 320 L245 195 L325 320 L325 195" fill="none" stroke="#ffffff" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
